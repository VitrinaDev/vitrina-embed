name: Publish @vitrina/widget to npm

# Publishes @vitrina/widget to PUBLIC npm on a version tag (v*) via OIDC
# "trusted publishing" — NO npm token stored anywhere (same model as Atribu's
# atribu-tracker). Requires (one-time, done on npmjs.com by an org owner):
#   1. The @vitrina scope owned by the `vitrina` npm org (done).
#   2. The package to already exist on npm (do the FIRST publish manually — see
#      PUBLISHING.md — because trusted-publisher config needs an existing pkg).
#   3. Package → Settings → Trusted Publisher → GitHub Actions: org VitrinaDev,
#      repo vitrina-embed, workflow publish.yml, environment npm-publish.
#   4. This repo → Settings → Environments → create `npm-publish`, restrict
#      deployments to tags matching v* (optionally a required reviewer).
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      # Node's bundled npm is too old for OIDC on scoped packages.
      - name: Upgrade npm
        run: npm install -g npm@latest
      - run: pnpm install --frozen-lockfile

      # The tag is the ONLY thing that triggers a release, so it must agree with
      # the version we are about to publish. Without this, tagging v0.1.2 while
      # packages/widget/package.json still says 0.1.1 would quietly try to
      # re-publish 0.1.1 — either a confusing no-op or a 403 conflict, long
      # after the tag made it look like 0.1.2 shipped.
      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./packages/widget/package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag v$TAG does not match packages/widget/package.json version $PKG"
            exit 1
          fi
          echo "tag v$TAG matches package version $PKG"

      - run: pnpm --filter @vitrina/widget build
      - run: pnpm --filter @vitrina/widget test
      - name: Publish (OIDC provenance)
        working-directory: packages/widget
        # No NODE_AUTH_TOKEN and no OTP: OIDC trusted publishing exchanges the
        # workflow's id-token for a short-lived npm credential. This is what
        # removes the 2FA one-time-password prompt from the release path.
        run: npm publish --provenance --access public
